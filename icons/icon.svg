<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="frame">
      <rect width="512" height="512" rx="96"/>
    </clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <!-- Black background -->
    <rect width="512" height="512" fill="#111111"/>

    <!-- Bear ears outer -->
    <circle cx="150" cy="152" r="54" fill="#ffffff"/>
    <circle cx="362" cy="152" r="54" fill="#ffffff"/>
    <!-- Bear ears inner -->
    <circle cx="150" cy="157" r="30" fill="#333333"/>
    <circle cx="362" cy="157" r="30" fill="#333333"/>

    <!-- Bear head -->
    <circle cx="256" cy="232" r="142" fill="#ffffff"/>

    <!-- Snout -->
    <ellipse cx="256" cy="282" rx="66" ry="52" fill="#dddddd"/>

    <!-- Eyes -->
    <circle cx="206" cy="212" r="20" fill="#111111"/>
    <circle cx="306" cy="212" r="20" fill="#111111"/>
    <!-- Eye shine -->
    <circle cx="213" cy="206" r="7" fill="#ffffff"/>
    <circle cx="313" cy="206" r="7" fill="#ffffff"/>

    <!-- Nose -->
    <ellipse cx="256" cy="264" rx="20" ry="14" fill="#111111"/>
    <ellipse cx="252" cy="260" rx="5" ry="3" fill="#ffffff" opacity="0.4"/>

    <!-- Mouth -->
    <path d="M 256 280 L 256 294" stroke="#111111" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M 256 294 Q 234 312 218 302" stroke="#111111" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M 256 294 Q 278 312 294 302" stroke="#111111" stroke-width="5" fill="none" stroke-linecap="round"/>

    <!-- Film strip (pellicule) bottom band -->
    <rect x="0" y="374" width="512" height="138" fill="#1e1e1e"/>

    <!-- Perforation strip top -->
    <rect x="0" y="374" width="512" height="30" fill="#141414"/>
    <!-- Perforations top row -->
    <rect x="16"  y="381" width="22" height="16" rx="3" fill="#111111"/>
    <rect x="56"  y="381" width="22" height="16" rx="3" fill="#111111"/>
    <rect x="96"  y="381" width="22" height="16" rx="3" fill="#111111"/>
    <rect x="136" y="381" width="22" height="16" rx="3" fill="#111111"/>
    <rect x="176" y="381" width="22" height="16" rx="3" fill="#111111"/>
    <rect x="216" y="381" width="22" height="16" rx="3" fill="#111111"/>
    <rect x="256" y="381" width="22" height="16" rx="3" fill="#111111"/>
    <rect x="296" y="381" width="22" height="16" rx="3" fill="#111111"/>
    <rect x="336" y="381" width="22" height="16" rx="3" fill="#111111"/>
    <rect x="376" y="381" width="22" height="16" rx="3" fill="#111111"/>
    <rect x="416" y="381" width="22" height="16" rx="3" fill="#111111"/>
    <rect x="456" y="381" width="22" height="16" rx="3" fill="#111111"/>

    <!-- Perforation strip bottom -->
    <rect x="0" y="482" width="512" height="30" fill="#141414"/>
    <!-- Perforations bottom row -->
    <rect x="16"  y="489" width="22" height="16" rx="3" fill="#111111"/>
    <rect x="56"  y="489" width="22" height="16" rx="3" fill="#111111"/>
    <rect x="96"  y="489" width="22" height="16" rx="3" fill="#111111"/>
    <rect x="136" y="489" width="22" height="16" rx="3" fill="#111111"/>
    <rect x="176" y="489" width="22" height="16" rx="3" fill="#111111"/>
    <rect x="216" y="489" width="22" height="16" rx="3" fill="#111111"/>
    <rect x="256" y="489" width="22" height="16" rx="3" fill="#111111"/>
    <rect x="296" y="489" width="22" height="16" rx="3" fill="#111111"/>
    <rect x="336" y="489" width="22" height="16" rx="3" fill="#111111"/>
    <rect x="376" y="489" width="22" height="16" rx="3" fill="#111111"/>
    <rect x="416" y="489" width="22" height="16" rx="3" fill="#111111"/>
    <rect x="456" y="489" width="22" height="16" rx="3" fill="#111111"/>

    <!-- Film frame dividers -->
    <rect x="128" y="404" width="2" height="78" fill="#383838"/>
    <rect x="256" y="404" width="2" height="78" fill="#383838"/>
    <rect x="384" y="404" width="2" height="78" fill="#383838"/>

    <!-- Frame highlights (middle frame) -->
    <rect x="258" y="404" width="126" height="78" fill="#2a2a2a"/>
  </g>
