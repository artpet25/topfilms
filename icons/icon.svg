<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="frame">
      <rect width="512" height="512" rx="96"/>
    </clipPath>
  </defs>
  <g clip-path="url(#frame)">
    <!-- White background -->
    <rect width="512" height="512" fill="#ffffff"/>

    <!-- Bear ears outer -->
    <circle cx="148" cy="160" r="56" fill="#111111"/>
    <circle cx="364" cy="160" r="56" fill="#111111"/>
    <!-- Bear ears inner -->
    <circle cx="148" cy="166" r="28" fill="#555555"/>
    <circle cx="364" cy="166" r="28" fill="#555555"/>

    <!-- Bear head -->
    <circle cx="256" cy="258" r="148" fill="#111111"/>

    <!-- Snout -->
    <ellipse cx="256" cy="306" rx="72" ry="56" fill="#444444"/>

    <!-- Eyes -->
    <circle cx="204" cy="232" r="20" fill="#ffffff"/>
    <circle cx="308" cy="232" r="20" fill="#ffffff"/>
    <!-- Pupils -->
    <circle cx="208" cy="236" r="10" fill="#111111"/>
    <circle cx="312" cy="236" r="10" fill="#111111"/>
    <!-- Eye shine -->
    <circle cx="212" cy="230" r="4" fill="#ffffff"/>
    <circle cx="316" cy="230" r="4" fill="#ffffff"/>

    <!-- Nose -->
    <ellipse cx="256" cy="286" rx="22" ry="15" fill="#ffffff"/>
    <ellipse cx="252" cy="282" rx="6" ry="4" fill="#111111" opacity="0.3"/>

    <!-- Mouth -->
    <path d="M 256 302 L 256 318" stroke="#ffffff" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M 256 318 Q 234 336 218 326" stroke="#ffffff" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M 256 318 Q 278 336 294 326" stroke="#ffffff" stroke-width="5" fill="none" stroke-linecap="round"/>

    <!-- Paw (bottom right) -->
    <ellipse cx="310" cy="440" rx="36" ry="26" fill="#111111"/>

    <!-- Camera body -->
    <rect x="326" y="374" width="130" height="82" rx="12" fill="#111111"/>
    <!-- Camera top stripe -->
    <rect x="326" y="374" width="130" height="18" rx="9" fill="#222222"/>

    <!-- Camera lens -->
    <circle cx="322" cy="415" r="32" fill="#333333"/>
    <circle cx="322" cy="415" r="24" fill="#111111"/>
    <circle cx="322" cy="415" r="12" fill="#444444"/>
    <circle cx="316" cy="409" r="5" fill="#ffffff" opacity="0.6"/>

    <!-- Film reels on top -->
    <circle cx="370" cy="364" r="26" fill="#333333"/>
    <circle cx="370" cy="364" r="18" fill="#111111"/>
    <circle cx="370" cy="364" r="5" fill="#555555"/>

    <circle cx="418" cy="364" r="20" fill="#333333"/>
    <circle cx="418" cy="364" r="13" fill="#111111"/>
    <circle cx="418" cy="364" r="4" fill="#555555"/>

    <!-- Rec light -->
    <circle cx="440" cy="400" r="6" fill="#111111"/>
    <circle cx="440" cy="400" r="3" fill="#333333"/>
  </g>
</svg>
